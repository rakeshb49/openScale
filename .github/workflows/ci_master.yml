# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches:
      'master'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android_app

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: "zulu" # See 'Supported distributions' for available options
          java-version: "21"
      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android_app/my-release-key.keystore"
          trap 'rm -f "$KEYSTORE_PATH"' EXIT
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"

          APK_DIR="$GITHUB_WORKSPACE/android_app/app/build/outputs/apk/debug"
          APK_PATH=$(find "$APK_DIR" -name "*.apk" | head -n 1)
          if [[ -z "$APK_PATH" ]]; then
            echo "::error::No APK found in $APK_DIR"
            exit 1
          fi

          BUILD_TOOLS_VERSION=34.0.0
          BUILD_TOOLS_PATH="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION"
          if [[ ! -d "$BUILD_TOOLS_PATH" ]]; then
            BUILD_TOOLS_VERSION=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -n 1)
            BUILD_TOOLS_PATH="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION"
          fi
          if [[ ! -x "$BUILD_TOOLS_PATH/zipalign" || ! -x "$BUILD_TOOLS_PATH/apksigner" ]]; then
            echo "::error::Required Android build-tools not found in $BUILD_TOOLS_PATH"
            exit 1
          fi

          "$BUILD_TOOLS_PATH/zipalign" -v -p 4 "$APK_PATH" "$APK_DIR/app-debug-aligned.apk"
          "$BUILD_TOOLS_PATH/apksigner" sign --ks "$KEYSTORE_PATH" --ks-key-alias "$KEY_ALIAS" --ks-pass env:KEYSTORE_PASSWORD --key-pass env:KEY_PASSWORD --out "$APK_DIR/app-debug-signed.apk" "$APK_DIR/app-debug-aligned.apk"

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "dev-build"
          prerelease: true
          title: "openScale development build"
          files: |
            android_app/app/build/outputs/apk/debug/app-debug-signed.apk
