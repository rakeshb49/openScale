name: CI beta

on:
  push:
    branches:
      - openScale-3.0
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android_app

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: "zulu" # See 'Supported distributions' for available options
          java-version: "21"
      - name: Build APK
        run: ./gradlew assembleBeta

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android_app/my-release-key.keystore"
          trap 'if [[ -f "$KEYSTORE_PATH" ]]; then if command -v shred >/dev/null 2>&1; then shred -u "$KEYSTORE_PATH"; else rm -f "$KEYSTORE_PATH"; fi; fi' EXIT
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"

          APK_DIR="$GITHUB_WORKSPACE/android_app/app/build/outputs/apk/beta"
          APK_PATH="$APK_DIR/app-beta.apk"
          if [[ ! -f "$APK_PATH" ]]; then
            APK_PATH="$(find "$APK_DIR" -maxdepth 1 -name "*.apk" ! -name "*-aligned.apk" ! -name "*-signed.apk" -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2- || true)"
          fi
          if [[ -z "$APK_PATH" ]]; then
            echo "::error::No APK found in $APK_DIR"
            exit 1
          fi

          if [[ -z "${ANDROID_SDK_ROOT:-}" ]]; then
            echo "::error::ANDROID_SDK_ROOT is not set"
            exit 1
          fi
          BUILD_TOOLS_PATH=$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          if [[ ! -x "$BUILD_TOOLS_PATH/zipalign" || ! -x "$BUILD_TOOLS_PATH/apksigner" ]]; then
            echo "::error::Required Android build-tools not found in $BUILD_TOOLS_PATH"
            exit 1
          fi

          "$BUILD_TOOLS_PATH/zipalign" -v -p 4 "$APK_PATH" "$APK_DIR/app-beta-aligned.apk"
          "$BUILD_TOOLS_PATH/apksigner" sign --ks "$KEYSTORE_PATH" --ks-key-alias "$KEY_ALIAS" --ks-pass env:KEYSTORE_PASSWORD --key-pass env:KEY_PASSWORD --out "$APK_DIR/app-beta-signed.apk" "$APK_DIR/app-beta-aligned.apk"

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "beta-build"
          prerelease: true
          title: "openScale 3.0 beta build"
          files: |
            android_app/app/build/outputs/apk/beta/app-beta-signed.apk
