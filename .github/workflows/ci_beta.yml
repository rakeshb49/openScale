name: CI beta

on:
  push:
    branches:
      - openScale-3.0
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android_app

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: "zulu" # See 'Supported distributions' for available options
          java-version: "21"
      - name: Build APK
        run: ./gradlew assembleBeta

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$KEYSTORE_BASE64" | base64 -d > my-release-key.keystore

          APK_PATH=$(find app/build/outputs/apk/beta -name "*.apk" | head -n 1)
          BUILD_TOOLS_VERSION=34.0.0
          BUILD_TOOLS_PATH="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION"

          "$BUILD_TOOLS_PATH/zipalign" -v -p 4 "$APK_PATH" app/build/outputs/apk/beta/app-beta-aligned.apk
          "$BUILD_TOOLS_PATH/apksigner" sign --ks my-release-key.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" --out app/build/outputs/apk/beta/app-beta-signed.apk app/build/outputs/apk/beta/app-beta-aligned.apk

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "beta-build"
          prerelease: true
          title: "openScale 3.0 beta build"
          files: |
            android_app/app/build/outputs/apk/beta/app-beta-signed.apk
